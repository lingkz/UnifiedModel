kind: metric_set
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "devops.metric.service"
  domain: devops
  display_name:
    en_us: "Service Metrics"
    zh_cn: "服务指标"
  description:
    en_us: "Golden metrics for DevOps services in the quickstart workspace."
    zh_cn: "Quickstart workspace 中 DevOps 服务的黄金指标。"
spec:
  labels:
    keys:
      - name: service_id
        type: string
        display_name:
          en_us: "Service ID"
          zh_cn: "服务 ID"
      - name: environment
        type: string
        display_name:
          en_us: "Environment"
          zh_cn: "环境"
    dynamic: false
  metrics:
    - name: request_count
      display_name:
        en_us: "Request Count"
        zh_cn: "请求数"
      unit: count
      data_format: KMB
      type: gauge
      query_mode: range
      generator: "sum(rate(devops_service_request_total{service_id=\"$service_id\"}[1m]))"
      aggregator: sum
      golden_metric: true
    - name: error_count
      display_name:
        en_us: "Error Count"
        zh_cn: "错误数"
      unit: count
      data_format: KMB
      type: gauge
      query_mode: range
      generator: "sum(rate(devops_service_error_total{service_id=\"$service_id\"}[1m]))"
      aggregator: sum
      golden_metric: true
    - name: latency_ms
      display_name:
        en_us: "Latency"
        zh_cn: "延迟"
      unit: ms
      data_format: ms
      type: gauge
      query_mode: range
      generator: "histogram_quantile(0.95, sum(rate(devops_service_request_duration_seconds_bucket{service_id=\"$service_id\"}[1m])) by (le)) * 1000"
      aggregator: avg
      golden_metric: true
  query_type: prom
  needs_processing: true
