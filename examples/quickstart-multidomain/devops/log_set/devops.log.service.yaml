kind: log_set
schema:
  url: "umodel.aliyun.com"
  version: "v1.0.0"
metadata:
  name: "devops.log.service"
  domain: devops
  display_name:
    en_us: "Service Logs"
    zh_cn: "服务日志"
  description:
    en_us: "Application logs emitted by DevOps services in the quickstart workspace."
    zh_cn: "Quickstart workspace 中 DevOps 服务产生的应用日志。"
spec:
  fields:
    - name: timestamp
      type: time
      display_name:
        en_us: "Timestamp"
        zh_cn: "时间"
    - name: service_id
      type: string
      display_name:
        en_us: "Service ID"
        zh_cn: "服务 ID"
    - name: environment
      type: string
      display_name:
        en_us: "Environment"
        zh_cn: "环境"
    - name: level
      type: string
      display_name:
        en_us: "Level"
        zh_cn: "级别"
    - name: message
      type: string
      display_name:
        en_us: "Message"
        zh_cn: "消息"
    - name: trace_id
      type: string
      display_name:
        en_us: "Trace ID"
        zh_cn: "Trace ID"
  time_field: timestamp
  name_fields:
    - message
  tag_fields:
    - service_id
    - environment
    - level
  ordered_fields:
    - timestamp
    - service_id
    - level
    - message
  default_order: desc
