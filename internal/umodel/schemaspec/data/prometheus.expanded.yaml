description:
  zh_cn: Prometheus 存储，用于描述开源 Prometheus 或 Prometheus 兼容接口的配置和查询规划信息。
  en_us: >-
    Prometheus storage, used to define open-source Prometheus or Prometheus-compatible endpoint metadata for query planning.
name: prometheus
versions:
- name: v1.0.0
  spec:
    type: object
    properties:
      kind:
        type: string
        constraint:
          required: true
          enum:
            values:
            - prometheus
      schema:
        type: object
        properties:
          url:
            description:
              zh_cn: Schema 的 URL。Core 部分都为 "umodel.aliyun.com"
              en_us: The url of the schema. The Core part is "umodel.aliyun.com"
            type: string
            constraint:
              required: true
          version:
            description:
              zh_cn: Schema 的版本。命名格式为 "v1.2.3"。
              en_us: The version of the schema. The format is "v1.2.3".
            type: string
            constraint:
              required: true
        constraint:
          required: true
      metadata:
        type: object
        properties:
          name:
            description:
              zh_cn: 元素在 UModel 系统中的名称。值不能为空。值格式为小写字母数字字符。
              en_us: >-
                The name of the Element in UModel System. The value cannot be empty.The value format is lowercase alphanumeric
                characters.
            type: string
            constraint:
              pattern: ^[a-zA-Z][a-zA-Z0-9-_\.]{0,127}$
              required: true
              min_len: 0
              max_len: 128
          display_name:
            description:
              zh_cn: 元素在 UModel 系统中的显示名称。值不能为空。
              en_us: The display name of the Element in UModel System. The value cannot be empty.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          description:
            description:
              zh_cn: 元素在 UModel 系统中的描述。
              en_us: The description of the Element in UModel System.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          short_description:
            description:
              zh_cn: 元素在 UModel系统中的简短描述。
              en_us: The short description of the Element in UModel System.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          domain:
            description:
              zh_cn: 域。值格式为'domain.domain'。可以以点连接。
              en_us: >-
                The domain of the Field. The value format is 'domain.domain'. it can be connected in the form of a dot.
            type: string
            constraint:
              pattern: ^[A-Za-z][a-zA-Z0-9-_\\.]*$
              required: true
              min_len: 0
              max_len: 128
          launch_stage:
            description:
              zh_cn: 元素的发布阶段。默认值为 preview。
              en_us: The launch stage of the Element. The default value is preview.
            type: string
            constraint:
              enum:
                values:
                - preview
                - beta
                - ga
                - deprecated
              default_value: preview
          icon:
            description:
              zh_cn: 元素在UModel系统中的图标。值格式为'url'。
              en_us: The icon of the Element in UModel System. The value format is 'url'.
            type: string
            release_stage: experimental
            constraint: null
          uri:
            description:
              zh_cn: 用于表示该元素唯一标识。
              en_us: This field is used to represent the unique identifier of the Element.
            type: string
            release_stage: experimental
            constraint: null
          tags:
            description:
              zh_cn: 用于表示该元素的标签。
              en_us: This field is used to represent the tags of the Element.
            type: map
            constraint:
              map:
                min_size: 1
                key:
                  type: string
                  constraint: null
                value:
                  type: string
          properties:
            description:
              zh_cn: 用于表示该元素的附加属性。
              en_us: This field is used to represent the additional properties of the Element.
            type: map
            constraint:
              map:
                key:
                  type: string
                  constraint: null
                value:
                  type: string
          common_schema_info:
            type: object
            description:
              zh_cn: >
                背景：在阿里云可观测业务使用中，内置的UModel数据会作为公共UModel（CommonSchema）默认存在，公共UModel数据以引用方式（CommonSchemaRef）配置在UModel，在查询时动态生成UModel实例并附加该字段作为额外说明。
                使用方式：该字段不需要手动配置，仅供查看。若存在该字段，则说明对应的UModel实例只可查看，不支持编辑或删除；若不存在该字段，则可根据业务需求按需编辑。
              en_us: >
                Background: In the use of Alibaba Cloud Observability business, the built-in UModel data will be defaulted
                as a common UModel (CommonSchema), and the common UModel data will be configured as a reference (CommonSchemaRef)
                in the UModel. When querying, a UModel instance will be dynamically generated and the field will be added
                as an additional description.  Usage: This field does not need to be manually configured, and is only for
                viewing. If this field exists, it means that the corresponding UModel instance can only be viewed, and editing
                or deletion is not supported; if this field does not exist, it can be edited according to business needs.
            properties:
              group:
                type: string
                description:
                  zh_cn: CommonSchema的Group信息
                  en_us: The group of the common schema
              version:
                type: string
                description:
                  zh_cn: CommonSchema的版本号
                  en_us: The version of the common schema
        constraint:
          required: true
      spec:
        type: object
        constraint:
          required: true
        description:
          zh_cn: Prometheus 的核心配置部分。UModel 只使用这些字段生成 PromQL 查询计划，不直接执行查询，也不保存明文凭据。
          en_us: >-
            The specification section for Prometheus. UModel uses these fields to generate PromQL query plans only; it does
            not execute queries or store plaintext credentials.
        properties:
          endpoint:
            description:
              zh_cn: Prometheus 或 Prometheus 兼容服务的访问地址，例如 http://prometheus:9090。
              en_us: >-
                The endpoint URL of Prometheus or a Prometheus-compatible service, for example http://prometheus:9090.
            type: string
            constraint:
              required: true
          api_prefix:
            description:
              zh_cn: Prometheus HTTP API 前缀。默认值为 /api/v1。
              en_us: Prometheus HTTP API prefix. Defaults to /api/v1.
            type: string
            constraint:
              default_value: /api/v1
          default_query_type:
            description:
              zh_cn: 默认 PromQL 查询类型。instant 表示即时查询，range 表示区间查询。
              en_us: >-
                Default PromQL query type. instant means instant query and range means range query.
            type: string
            constraint:
              enum:
                values:
                - instant
                - range
              default_value: instant
          default_step:
            description:
              zh_cn: 区间查询的默认 step，例如 60s、1m。
              en_us: Default step for range queries, for example 60s or 1m.
            type: string
          lookback_delta:
            description:
              zh_cn: PromQL 查询规划使用的默认回看窗口，例如 5m。
              en_us: Default PromQL lookback window used by query planning, for example 5m.
            type: string
          tenant:
            description:
              zh_cn: 可选租户标识，用于多租户 Prometheus 兼容系统。
              en_us: Optional tenant identifier for multi-tenant Prometheus-compatible systems.
            type: string
          tenant_header:
            description:
              zh_cn: 多租户系统使用的租户 HTTP 头名称，例如 X-Scope-OrgID。
              en_us: Tenant HTTP header name used by multi-tenant systems, for example X-Scope-OrgID.
            type: string
          credential_ref:
            description:
              zh_cn: 凭据引用标识，例如 secret://prometheus-prod-readonly。不得在 UModel 中保存明文用户名、密码或 Token。
              en_us: >-
                Credential reference, for example secret://prometheus-prod-readonly. Plaintext usernames, passwords, or tokens
                must not be stored in UModel.
            type: string
          tls_verify:
            description:
              zh_cn: 是否校验 TLS 证书。默认值为 true。
              en_us: Whether TLS certificates should be verified. Defaults to true.
            type: boolean
            constraint:
              default_value: true
          external_labels:
            description:
              zh_cn: Prometheus 外部标签，用于 query planning 时补充查询上下文或结果来源说明。
              en_us: >-
                Prometheus external labels used to enrich query-planning context or describe result origin.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
          headers:
            description:
              zh_cn: 非敏感 HTTP 头，用于租户、路由等查询上下文。不得存放认证密钥。
              en_us: >-
                Non-sensitive HTTP headers for tenant or routing context. Authentication secrets must not be stored here.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
          properties:
            description:
              zh_cn: Prometheus 的额外非敏感配置，以键值对形式存储。
              en_us: Additional non-sensitive Prometheus configuration, stored as key-value pairs.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
          tags:
            description:
              zh_cn: 用于标注该 Prometheus 存储的标签。
              en_us: Tags used to describe this Prometheus storage.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
