description:
  zh_cn: Elasticsearch 存储，用于描述 Elasticsearch 集群、索引以及查询规划所需的连接信息。
  en_us: >-
    Elasticsearch storage, used to define the Elasticsearch cluster, index, and connection metadata required for query planning.
name: elasticsearch
versions:
- name: v1.0.0
  spec:
    type: object
    properties:
      kind:
        type: string
        constraint:
          required: true
          enum:
            values:
            - elasticsearch
      schema:
        type: object
        properties:
          url:
            description:
              zh_cn: Schema 的 URL。Core 部分都为 "umodel.aliyun.com"
              en_us: The url of the schema. The Core part is "umodel.aliyun.com"
            type: string
            constraint:
              required: true
          version:
            description:
              zh_cn: Schema 的版本。命名格式为 "v1.2.3"。
              en_us: The version of the schema. The format is "v1.2.3".
            type: string
            constraint:
              required: true
        constraint:
          required: true
      metadata:
        type: object
        properties:
          name:
            description:
              zh_cn: 元素在 UModel 系统中的名称。值不能为空。值格式为小写字母数字字符。
              en_us: >-
                The name of the Element in UModel System. The value cannot be empty.The value format is lowercase alphanumeric
                characters.
            type: string
            constraint:
              pattern: ^[a-zA-Z][a-zA-Z0-9-_\.]{0,127}$
              required: true
              min_len: 0
              max_len: 128
          display_name:
            description:
              zh_cn: 元素在 UModel 系统中的显示名称。值不能为空。
              en_us: The display name of the Element in UModel System. The value cannot be empty.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          description:
            description:
              zh_cn: 元素在 UModel 系统中的描述。
              en_us: The description of the Element in UModel System.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          short_description:
            description:
              zh_cn: 元素在 UModel系统中的简短描述。
              en_us: The short description of the Element in UModel System.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          domain:
            description:
              zh_cn: 域。值格式为'domain.domain'。可以以点连接。
              en_us: >-
                The domain of the Field. The value format is 'domain.domain'. it can be connected in the form of a dot.
            type: string
            constraint:
              pattern: ^[A-Za-z][a-zA-Z0-9-_\\.]*$
              required: true
              min_len: 0
              max_len: 128
          launch_stage:
            description:
              zh_cn: 元素的发布阶段。默认值为 preview。
              en_us: The launch stage of the Element. The default value is preview.
            type: string
            constraint:
              enum:
                values:
                - preview
                - beta
                - ga
                - deprecated
              default_value: preview
          icon:
            description:
              zh_cn: 元素在UModel系统中的图标。值格式为'url'。
              en_us: The icon of the Element in UModel System. The value format is 'url'.
            type: string
            release_stage: experimental
            constraint: null
          uri:
            description:
              zh_cn: 用于表示该元素唯一标识。
              en_us: This field is used to represent the unique identifier of the Element.
            type: string
            release_stage: experimental
            constraint: null
          tags:
            description:
              zh_cn: 用于表示该元素的标签。
              en_us: This field is used to represent the tags of the Element.
            type: map
            constraint:
              map:
                min_size: 1
                key:
                  type: string
                  constraint: null
                value:
                  type: string
          properties:
            description:
              zh_cn: 用于表示该元素的附加属性。
              en_us: This field is used to represent the additional properties of the Element.
            type: map
            constraint:
              map:
                key:
                  type: string
                  constraint: null
                value:
                  type: string
          common_schema_info:
            type: object
            description:
              zh_cn: >
                背景：在阿里云可观测业务使用中，内置的UModel数据会作为公共UModel（CommonSchema）默认存在，公共UModel数据以引用方式（CommonSchemaRef）配置在UModel，在查询时动态生成UModel实例并附加该字段作为额外说明。
                使用方式：该字段不需要手动配置，仅供查看。若存在该字段，则说明对应的UModel实例只可查看，不支持编辑或删除；若不存在该字段，则可根据业务需求按需编辑。
              en_us: >
                Background: In the use of Alibaba Cloud Observability business, the built-in UModel data will be defaulted
                as a common UModel (CommonSchema), and the common UModel data will be configured as a reference (CommonSchemaRef)
                in the UModel. When querying, a UModel instance will be dynamically generated and the field will be added
                as an additional description.  Usage: This field does not need to be manually configured, and is only for
                viewing. If this field exists, it means that the corresponding UModel instance can only be viewed, and editing
                or deletion is not supported; if this field does not exist, it can be edited according to business needs.
            properties:
              group:
                type: string
                description:
                  zh_cn: CommonSchema的Group信息
                  en_us: The group of the common schema
              version:
                type: string
                description:
                  zh_cn: CommonSchema的版本号
                  en_us: The version of the common schema
        constraint:
          required: true
      spec:
        type: object
        constraint:
          required: true
        description:
          zh_cn: Elasticsearch 的核心配置部分。UModel 只使用这些字段生成 Elasticsearch 查询计划，不直接执行查询，也不保存明文凭据。
          en_us: >-
            The specification section for Elasticsearch. UModel uses these fields to generate Elasticsearch query plans only;
            it does not execute queries or store plaintext credentials.
        properties:
          endpoint:
            description:
              zh_cn: Elasticsearch 集群访问地址，例如 https://es.example.com:9200。
              en_us: The Elasticsearch cluster endpoint, for example https://es.example.com:9200.
            type: string
            constraint:
              required: true
          index:
            description:
              zh_cn: 默认查询索引名称，也可以是 Elasticsearch 支持的索引通配表达式。
              en_us: >-
                The default index name to query. It may also be an Elasticsearch-supported index wildcard expression.
            type: string
            constraint:
              required: true
          index_pattern:
            description:
              zh_cn: 面向按时间滚动索引的索引模式，例如 logs-${yyyy.MM.dd}。如果为空，查询规划使用 index 字段。
              en_us: >-
                Index pattern for time-rolled indices, for example logs-${yyyy.MM.dd}. When empty, query planning uses the
                index field.
            type: string
          version:
            description:
              zh_cn: Elasticsearch 版本号或版本族，例如 7.x、8.x。
              en_us: The Elasticsearch version or version family, for example 7.x or 8.x.
            type: string
          query_dialect:
            description:
              zh_cn: 查询生成方言。默认生成 Elasticsearch Query DSL。
              en_us: Query generation dialect. Elasticsearch Query DSL is used by default.
            type: string
            constraint:
              enum:
                values:
                - elasticsearch_dsl
                - lucene
                - eql
              default_value: elasticsearch_dsl
          time_field:
            description:
              zh_cn: 时间过滤字段名，用于将请求时间范围下推到 Elasticsearch 查询中。
              en_us: Time field used to push request time ranges into Elasticsearch queries.
            type: string
          default_size:
            description:
              zh_cn: 未显式指定 limit 时生成查询的默认 size。
              en_us: Default query size when no explicit limit is provided.
            type: integer
            constraint:
              default_value: 1000
          max_size:
            description:
              zh_cn: 查询规划允许生成的最大 size，用于避免生成过大的查询计划。
              en_us: >-
                Maximum query size allowed by the planner to avoid producing excessively large query plans.
            type: integer
            constraint:
              default_value: 10000
          routing:
            description:
              zh_cn: 可选的 Elasticsearch routing 值。用于规划需要固定 routing 的查询。
              en_us: >-
                Optional Elasticsearch routing value for queries that should target a fixed routing key.
            type: string
          credential_ref:
            description:
              zh_cn: 凭据引用标识，例如 secret://es-prod-readonly。不得在 UModel 中保存明文用户名、密码或 Token。
              en_us: >-
                Credential reference, for example secret://es-prod-readonly. Plaintext usernames, passwords, or tokens must
                not be stored in UModel.
            type: string
          tls_verify:
            description:
              zh_cn: 是否校验 TLS 证书。默认值为 true。
              en_us: Whether TLS certificates should be verified. Defaults to true.
            type: boolean
            constraint:
              default_value: true
          headers:
            description:
              zh_cn: 非敏感 HTTP 头，用于租户、路由等查询上下文。不得存放认证密钥。
              en_us: >-
                Non-sensitive HTTP headers for tenant or routing context. Authentication secrets must not be stored here.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
          properties:
            description:
              zh_cn: Elasticsearch 的额外非敏感配置，以键值对形式存储。
              en_us: Additional non-sensitive Elasticsearch configuration, stored as key-value pairs.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
          tags:
            description:
              zh_cn: 用于标注该 Elasticsearch 存储的标签。
              en_us: Tags used to describe this Elasticsearch storage.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
