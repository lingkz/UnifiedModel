description:
  zh_cn: MySQL 存储，用于描述 MySQL 实例、数据库、表以及查询规划所需的连接信息。
  en_us: >-
    MySQL storage, used to define the MySQL instance, database, table, and connection metadata required for query planning.
name: mysql
versions:
- name: v1.0.0
  spec:
    type: object
    properties:
      kind:
        type: string
        constraint:
          required: true
          enum:
            values:
            - mysql
      schema:
        type: object
        properties:
          url:
            description:
              zh_cn: Schema 的 URL。Core 部分都为 "umodel.aliyun.com"
              en_us: The url of the schema. The Core part is "umodel.aliyun.com"
            type: string
            constraint:
              required: true
          version:
            description:
              zh_cn: Schema 的版本。命名格式为 "v1.2.3"。
              en_us: The version of the schema. The format is "v1.2.3".
            type: string
            constraint:
              required: true
        constraint:
          required: true
      metadata:
        type: object
        properties:
          name:
            description:
              zh_cn: 元素在 UModel 系统中的名称。值不能为空。值格式为小写字母数字字符。
              en_us: >-
                The name of the Element in UModel System. The value cannot be empty.The value format is lowercase alphanumeric
                characters.
            type: string
            constraint:
              pattern: ^[a-zA-Z][a-zA-Z0-9-_\.]{0,127}$
              required: true
              min_len: 0
              max_len: 128
          display_name:
            description:
              zh_cn: 元素在 UModel 系统中的显示名称。值不能为空。
              en_us: The display name of the Element in UModel System. The value cannot be empty.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          description:
            description:
              zh_cn: 元素在 UModel 系统中的描述。
              en_us: The description of the Element in UModel System.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          short_description:
            description:
              zh_cn: 元素在 UModel系统中的简短描述。
              en_us: The short description of the Element in UModel System.
            type: object
            properties:
              zh_cn:
                description:
                  zh_cn: 中文描述
                  en_us: Chinese description
                type: string
              en_us:
                description:
                  zh_cn: 英文描述
                  en_us: English description
                type: string
          domain:
            description:
              zh_cn: 域。值格式为'domain.domain'。可以以点连接。
              en_us: >-
                The domain of the Field. The value format is 'domain.domain'. it can be connected in the form of a dot.
            type: string
            constraint:
              pattern: ^[A-Za-z][a-zA-Z0-9-_\\.]*$
              required: true
              min_len: 0
              max_len: 128
          launch_stage:
            description:
              zh_cn: 元素的发布阶段。默认值为 preview。
              en_us: The launch stage of the Element. The default value is preview.
            type: string
            constraint:
              enum:
                values:
                - preview
                - beta
                - ga
                - deprecated
              default_value: preview
          icon:
            description:
              zh_cn: 元素在UModel系统中的图标。值格式为'url'。
              en_us: The icon of the Element in UModel System. The value format is 'url'.
            type: string
            release_stage: experimental
            constraint: null
          uri:
            description:
              zh_cn: 用于表示该元素唯一标识。
              en_us: This field is used to represent the unique identifier of the Element.
            type: string
            release_stage: experimental
            constraint: null
          tags:
            description:
              zh_cn: 用于表示该元素的标签。
              en_us: This field is used to represent the tags of the Element.
            type: map
            constraint:
              map:
                min_size: 1
                key:
                  type: string
                  constraint: null
                value:
                  type: string
          properties:
            description:
              zh_cn: 用于表示该元素的附加属性。
              en_us: This field is used to represent the additional properties of the Element.
            type: map
            constraint:
              map:
                key:
                  type: string
                  constraint: null
                value:
                  type: string
          common_schema_info:
            type: object
            description:
              zh_cn: >
                背景：在阿里云可观测业务使用中，内置的UModel数据会作为公共UModel（CommonSchema）默认存在，公共UModel数据以引用方式（CommonSchemaRef）配置在UModel，在查询时动态生成UModel实例并附加该字段作为额外说明。
                使用方式：该字段不需要手动配置，仅供查看。若存在该字段，则说明对应的UModel实例只可查看，不支持编辑或删除；若不存在该字段，则可根据业务需求按需编辑。
              en_us: >
                Background: In the use of Alibaba Cloud Observability business, the built-in UModel data will be defaulted
                as a common UModel (CommonSchema), and the common UModel data will be configured as a reference (CommonSchemaRef)
                in the UModel. When querying, a UModel instance will be dynamically generated and the field will be added
                as an additional description.  Usage: This field does not need to be manually configured, and is only for
                viewing. If this field exists, it means that the corresponding UModel instance can only be viewed, and editing
                or deletion is not supported; if this field does not exist, it can be edited according to business needs.
            properties:
              group:
                type: string
                description:
                  zh_cn: CommonSchema的Group信息
                  en_us: The group of the common schema
              version:
                type: string
                description:
                  zh_cn: CommonSchema的版本号
                  en_us: The version of the common schema
        constraint:
          required: true
      spec:
        type: object
        constraint:
          required: true
        description:
          zh_cn: MySQL 的核心配置部分。UModel 只使用这些字段生成只读 SQL 查询计划，不直接连接数据库，也不保存明文凭据。
          en_us: >-
            The specification section for MySQL. UModel uses these fields to generate read-only SQL query plans only; it does
            not connect to databases or store plaintext credentials.
        properties:
          endpoint:
            description:
              zh_cn: MySQL 实例访问地址，格式通常为 host:port。
              en_us: The MySQL instance endpoint, usually in host:port format.
            type: string
            constraint:
              required: true
          database:
            description:
              zh_cn: 默认查询数据库名称。
              en_us: The default database name to query.
            type: string
            constraint:
              required: true
          table:
            description:
              zh_cn: 默认查询表名。若 DataSet 或查询参数中指定表名，可覆盖此字段。
              en_us: >-
                The default table name to query. It can be overridden by the DataSet or query parameters.
            type: string
          sql_template:
            description:
              zh_cn: 可选 SQL 模板，用于特殊查询规划场景。模板必须保持只读语义，不应包含 INSERT、UPDATE、DELETE、DDL 等语句。
              en_us: >-
                Optional SQL template for special query planning scenarios. The template must keep read-only semantics and
                should not contain INSERT, UPDATE, DELETE, DDL, or similar statements.
            type: string
          sql_dialect:
            description:
              zh_cn: SQL 方言。MySQL 存储默认使用 mysql。
              en_us: SQL dialect. MySQL storage uses mysql by default.
            type: string
            constraint:
              enum:
                values:
                - mysql
                - ansi
              default_value: mysql
          time_field:
            description:
              zh_cn: 时间过滤字段名，用于将请求时间范围下推到 SQL WHERE 条件中。
              en_us: Time field used to push request time ranges into SQL WHERE conditions.
            type: string
          time_unit:
            description:
              zh_cn: time_field 的时间单位。默认值为 second。
              en_us: Time unit of time_field. Defaults to second.
            type: string
            constraint:
              enum:
                values:
                - second
                - millisecond
                - microsecond
                - nanosecond
                - datetime
              default_value: second
          default_limit:
            description:
              zh_cn: 未显式指定 limit 时生成查询的默认 LIMIT。
              en_us: Default SQL LIMIT when no explicit limit is provided.
            type: integer
            constraint:
              default_value: 1000
          max_limit:
            description:
              zh_cn: 查询规划允许生成的最大 LIMIT，用于避免生成过大的查询计划。
              en_us: >-
                Maximum SQL LIMIT allowed by the planner to avoid producing excessively large query plans.
            type: integer
            constraint:
              default_value: 10000
          read_only:
            description:
              zh_cn: 标识该存储是否只能规划只读查询。默认值为 true；UModel PaaS 查询规划不应生成写入语句。
              en_us: >-
                Indicates whether this storage should only plan read-only queries. Defaults to true; UModel PaaS query planning
                should not generate write statements.
            type: boolean
            constraint:
              default_value: true
          credential_ref:
            description:
              zh_cn: 凭据引用标识，例如 secret://mysql-prod-readonly。不得在 UModel 中保存明文用户名、密码或 Token。
              en_us: >-
                Credential reference, for example secret://mysql-prod-readonly. Plaintext usernames, passwords, or tokens
                must not be stored in UModel.
            type: string
          tls_mode:
            description:
              zh_cn: MySQL TLS 模式。默认值为 preferred。
              en_us: MySQL TLS mode. Defaults to preferred.
            type: string
            constraint:
              enum:
                values:
                - disabled
                - preferred
                - required
                - verify_ca
                - verify_identity
              default_value: preferred
          properties:
            description:
              zh_cn: MySQL 的额外非敏感配置，以键值对形式存储。
              en_us: Additional non-sensitive MySQL configuration, stored as key-value pairs.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
          tags:
            description:
              zh_cn: 用于标注该 MySQL 存储的标签。
              en_us: Tags used to describe this MySQL storage.
            type: map
            constraint:
              map:
                key:
                  type: string
                value:
                  type: string
